[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/providers"
  to = "/.netlify/functions/providers"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/ledger"
  to = "/.netlify/functions/ledger"
  status = 200

[[redirects]]
  from = "/api/vote"
  to = "/.netlify/functions/vote"
  status = 200
